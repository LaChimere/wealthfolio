name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop
      - "feature/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package types
        run: bun run build:types

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun run test

      - name: Run backend tests
        run: bun run test:backend

      - name: Run Electron tests
        run: bun run test:electron

      - name: Run add-on SDK tests
        run: bun run test:addon-sdk

      - name: Run backend contract tests
        run: bun run test:backend-contracts

      - name: Build frontend
        run: bun run build

  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace
        env:
          # Required for outbox tests in storage-sqlite
          CONNECT_API_URL: http://test.local

  backend-keyring-check:
    name: Backend Keyring Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run keyring-focused backend tests
        run: >
          bun test apps/backend/src/domains/secrets.test.ts apps/backend/src/runtime.test.ts
          --test-name-pattern keyring

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: [frontend-check, rust-check, backend-keyring-check]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [[ "${{ needs.frontend-check.result }}" == "failure" ]] || [[ "${{ needs.rust-check.result }}" == "failure" ]] || [[ "${{ needs.backend-keyring-check.result }}" == "failure" ]]; then
            echo "❌ Build failed"
            exit 1
          elif [[ "${{ needs.frontend-check.result }}" == "cancelled" ]] || [[ "${{ needs.rust-check.result }}" == "cancelled" ]] || [[ "${{ needs.backend-keyring-check.result }}" == "cancelled" ]]; then
            echo "⚠️ Build was cancelled"
            exit 1
          else
            echo "✅ All checks passed"
          fi
