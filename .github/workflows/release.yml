name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: "macos-x64"
            platform: "macos-latest"
            sidecar_target: "bun-darwin-x64"
            electron_args: "--mac --x64"
          - id: "macos-arm64"
            platform: "macos-latest"
            sidecar_target: "bun-darwin-arm64"
            electron_args: "--mac --arm64"
          - id: "windows-x64"
            platform: "windows-latest"
            sidecar_target: "bun-windows-x64"
            electron_args: "--win --x64"
          - id: "windows-arm64"
            platform: "windows-latest"
            sidecar_target: "bun-windows-arm64"
            electron_args: "--win --arm64"
          - id: "linux-x64"
            platform: "ubuntu-24.04"
            sidecar_target: "bun-linux-x64"
            electron_args: "--linux --x64"
          - id: "linux-arm64"
            platform: "ubuntu-24.04-arm"
            sidecar_target: "bun-linux-arm64"
            electron_args: "--linux --arm64"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (ubuntu only)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential fakeroot libarchive-tools libssl-dev libsqlite3-dev patchelf pkg-config rpm

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron renderer and shell
        env:
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
        run: bun run build:electron

      - name: Build Electron sidecar
        shell: bash
        env:
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
          CONNECT_API_URL: ${{ vars.CONNECT_API_URL }}
          WF_ELECTRON_SIDECAR_TARGET: ${{ matrix.sidecar_target }}
        run: bun run build:electron:sidecar

      - name: Package Electron artifacts
        shell: bash
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_NAME: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run --cwd apps/electron dist -- ${{ matrix.electron_args }} --publish never

      - name: Stage Electron release files
        shell: bash
        run: |
          mkdir -p target/electron-upload
          find target/electron -maxdepth 1 -type f ! -name '*.yaml' -print -exec cp {} target/electron-upload/ \;

      - name: Upload Electron release files
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.id }}
          path: target/electron-upload/*
          if-no-files-found: error

  publish-electron-release:
    needs: release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Download Electron release files
        uses: actions/download-artifact@v4
        with:
          pattern: electron-*
          path: target/electron-release-assets
          merge-multiple: false

      - name: Merge Electron update metadata
        run: |
          bun run scripts/merge-electron-update-metadata.mjs target/electron-release-assets
          find target/electron-release-assets -mindepth 2 -name 'latest*.yml' -delete

      - name: Publish draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(node -p "require('./package.json').version")"
            TAG="v${VERSION}"
          fi
          TITLE="Wealthfolio ${TAG}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --draft --title "${TITLE}" --notes "See the assets to download and install this version."
          fi
          shopt -s globstar nullglob
          gh release upload "${TAG}" target/electron-release-assets/**/* --clobber

  prebuild-server-linux:
    # Standalone server tarball for self-hosters (Proxmox LXC, bare metal, systemd).
    # Tracks: https://github.com/wealthfolio/wealthfolio/issues/563
    # Built on ubuntu-22.04 (glibc 2.35) for forward compatibility with Debian 12+/Ubuntu 22.04+.
    needs: publish-electron-release
    # Run even if some matrix entries in `release` failed (fail-fast is off).
    # Only skip on explicit cancellation.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend (web target)
        env:
          BUILD_TARGET: web
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
        run: bun run build

      - name: Build TS backend binary
        env:
          CONNECT_AUTH_URL: ${{ vars.CONNECT_AUTH_URL }}
          CONNECT_AUTH_PUBLISHABLE_KEY: ${{ vars.CONNECT_AUTH_PUBLISHABLE_KEY }}
          CONNECT_API_URL: ${{ vars.CONNECT_API_URL }}
        run: |
          mkdir -p target/prebuild-server
          bun build apps/backend/src/main.ts \
            --compile \
            --target=bun-linux-x64-baseline \
            --outfile target/prebuild-server/wealthfolio-backend

      - name: Stage backend runtime assets
        run: |
          mkdir -p target/prebuild-server/backend-assets
          cp -r crates/storage-sqlite/migrations target/prebuild-server/backend-assets/migrations
          cp crates/market-data/src/resolver/exchanges.json target/prebuild-server/backend-assets/exchanges.json
          cp crates/ai/src/ai_providers.json target/prebuild-server/backend-assets/ai_providers.json

      - name: Smoke test TS backend binary
        shell: bash
        run: |
          set -euo pipefail
          TMP_DIR="$(mktemp -d)"
          WF_LISTEN_ADDR=127.0.0.1:0 \
            WF_SECRET_KEY="$(openssl rand -base64 32)" \
            WF_AUTH_REQUIRED=false \
            WF_DB_PATH="${TMP_DIR}/app.db" \
            WF_STATIC_DIR="${PWD}/dist" \
            WF_MIGRATIONS_DIR="${PWD}/target/prebuild-server/backend-assets/migrations" \
            WF_EXCHANGE_CATALOG_PATH="${PWD}/target/prebuild-server/backend-assets/exchanges.json" \
            WF_AI_PROVIDER_CATALOG_PATH="${PWD}/target/prebuild-server/backend-assets/ai_providers.json" \
            target/prebuild-server/wealthfolio-backend >"${TMP_DIR}/server.log" 2>&1 &
          SERVER_PID="$!"
          cleanup() {
            if kill -0 "${SERVER_PID}" 2>/dev/null; then
              kill "${SERVER_PID}"
              wait "${SERVER_PID}" || true
            fi
            rm -rf "${TMP_DIR}"
          }
          trap cleanup EXIT
          for _ in {1..80}; do
            SERVER_URL="$(sed -n 's/.*listening on //p' "${TMP_DIR}/server.log" | tail -1)"
            if [[ -n "${SERVER_URL}" ]] && curl -fsS "${SERVER_URL}/api/v1/readyz" >/dev/null; then
              exit 0
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              cat "${TMP_DIR}/server.log"
              exit 1
            fi
            sleep 0.25
          done
          cat "${TMP_DIR}/server.log"
          exit 1

      - name: Stage tarball contents
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="wealthfolio-backend-${VERSION}-linux-amd64"
          mkdir -p "${STAGE}"
          cp target/prebuild-server/wealthfolio-backend "${STAGE}/wealthfolio-backend"
          cp -r target/prebuild-server/backend-assets "${STAGE}/backend-assets"
          cp -r dist "${STAGE}/dist"
          cp LICENSE "${STAGE}/LICENSE" 2>/dev/null || true
          cp packaging/server-prebuild/wealthfolio.service.example "${STAGE}/wealthfolio.service.example"
          cp packaging/server-prebuild/README.md "${STAGE}/README.md"

      - name: Create tarball + checksum
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGE="wealthfolio-backend-${VERSION}-linux-amd64"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            wealthfolio-backend-*-linux-amd64.tar.gz
            wealthfolio-backend-*-linux-amd64.tar.gz.sha256
